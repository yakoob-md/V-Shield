name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          echo "✅ Frontend built successfully"
          ls -la dist/

      - name: Create clean HF deployment directory
        run: |
          mkdir -p /tmp/hf-deploy

          # HF Spaces requires README.md with YAML frontmatter (no leading spaces!)
          printf '%s\n' \
            '---' \
            'title: V-Shield AI' \
            'emoji: 🛡️' \
            'colorFrom: indigo' \
            'colorTo: cyan' \
            'sdk: docker' \
            'pinned: false' \
            '---' \
            '' \
            '# 🛡️ V-Shield AI: Vernacular Anti-Doping Assistant' \
            'A voice-first RAG assistant that protects Indian athletes from unintentional doping.' \
            > /tmp/hf-deploy/README.md

          echo "--- README.md contents ---"
          cat /tmp/hf-deploy/README.md
          echo "--------------------------"

          # Backend files
          cp Dockerfile         /tmp/hf-deploy/
          cp requirements.txt   /tmp/hf-deploy/
          cp main.py            /tmp/hf-deploy/
          cp preload_model.py   /tmp/hf-deploy/
          cp build_vector_db.py /tmp/hf-deploy/

          # Built frontend
          mkdir -p /tmp/hf-deploy/frontend/dist
          cp -r frontend/dist/. /tmp/hf-deploy/frontend/dist/

          echo "📦 Files prepared for HF deployment:"
          find /tmp/hf-deploy -type f | sort

      - name: Push clean deployment to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ ERROR: HF_TOKEN secret is not set!"
            exit 1
          fi
          echo "✅ HF_TOKEN is set (length: ${#HF_TOKEN})"

          cd /tmp/hf-deploy

          git init
          git checkout -b main
          git config user.email "ci@github-actions.com"
          git config user.name "GitHub Actions Bot"

          git add .
          git status
          git commit -m "Deploy V-Shield AI to HF Spaces [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"

          echo "🚀 Pushing to Hugging Face Space..."
          git push --force \
            "https://yakub-md:${HF_TOKEN}@huggingface.co/spaces/yakub-md/v-shield" \
            main:main
          echo "✅ Successfully deployed to Hugging Face Space!"
