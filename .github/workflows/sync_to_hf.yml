name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace yakoob-md/v-shield-ai with your actual HF username and Space name
          git push --force https://yakoob-md:$HF_TOKEN@huggingface.co/spaces/yakub-md/v-shield HEAD:main
